[all:vars]
ansible_user=hughboi
ansible_become=yes
ansible_become_method=sudo
ansible_ssh_private_key_file=~/.ssh/id_ed25519

# ─── Proxmox Nodes ────────────────────────────────────────────────
[pve]
pve-srv-1 ansible_host=10.10.10.1
pve-srv-2 ansible_host=10.10.10.2
pve-srv-3 ansible_host=10.10.10.3
pve-srv-4 ansible_host=10.10.10.4

# ─── Management Plane ─────────────────────────────────────────────
[athena]
athena ansible_host=10.10.10.8

# ─── Netboot ───────────────────────────────────────────────────────
[netboot]
libre-potato ansible_host=10.10.99.99

# ─── Docker Host ──────────────────────────────────────────────────
[docker]
dock-prod ansible_host=10.10.10.10

[docker_host]
dock-prod ansible_host=10.10.10.10

[vaultwarden_host]
dock-prod ansible_host=10.10.10.10

# ─── k3s Cluster ─────────────────────────────────────────────────
[k3s:children]
masters
workers
longhorn

[masters]
k3s-master-1 ansible_host=10.10.30.1
k3s-master-2 ansible_host=10.10.30.2
k3s-master-3 ansible_host=10.10.30.3

[workers]
k3s-worker-1 ansible_host=10.10.30.11
k3s-worker-2 ansible_host=10.10.30.12
k3s-worker-3 ansible_host=10.10.30.13

[longhorn]
k3s-longhorn-1 ansible_host=10.10.30.51
k3s-longhorn-2 ansible_host=10.10.30.52
k3s-longhorn-3 ansible_host=10.10.30.53

# ─── Groupings ────────────────────────────────────────────────────
[ubuntu:children]
athena
docker
masters
workers
longhorn

[all_k8s:children]
masters
workers
longhorn
