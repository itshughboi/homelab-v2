---
# Rolling cluster update for Proxmox nodes.
# Updates one node at a time: drains VMs to other nodes, runs apt upgrade + pveupgrade,
# reboots if needed, then waits for the node to rejoin the cluster before moving on.
#
# IMPORTANT: Requires at least 2 nodes so VMs have somewhere to migrate.
# VMs must have migration enabled and sufficient RAM/CPU on target nodes.
# Review the dry_run var before running for real.
#
# Run order is determined by inventory order — put your least critical node first.

- name: Rolling Proxmox cluster update
  hosts: proxmox
  gather_facts: true
  become: true
  serial: 1    # strictly one node at a time

  vars:
    dry_run: false            # set true to skip actual apt/pveupgrade and reboot
    migrate_timeout: 600      # seconds to wait for each VM migration
    reboot_timeout: 600       # seconds to wait for node to come back after reboot
    ntfy_url: "https://ntfy.hughboi.cc/homelab"

  tasks:
    - name: Update {{ inventory_hostname }}
      block:
        - name: Notify start
          ansible.builtin.uri:
            url: "{{ ntfy_url }}"
            method: POST
            headers:
              Title: "PVE Update: starting {{ inventory_hostname }}"
              Priority: default
              Tags: arrows_counterclockwise
            body: "Beginning rolling update on {{ inventory_hostname }}"
            body_format: raw
            status_code: 200
          ignore_errors: true

        - name: Get running VMs on this node
          ansible.builtin.shell:
            cmd: qm list 2>/dev/null | awk 'NR>1 && $3=="running" {print $1}'
          register: running_vms
          changed_when: false

        - name: Get other cluster nodes to migrate VMs to
          ansible.builtin.shell:
            cmd: |
              pvesh get /nodes --output-format json | python3 -c "
              import sys, json
              nodes = json.load(sys.stdin)
              current = '{{ inventory_hostname }}'
              others = [n['node'] for n in nodes if n['node'] != current and n['status'] == 'online']
              print(others[0] if others else '')
              "
          register: migration_target
          changed_when: false

        - name: Fail if no migration target available
          ansible.builtin.fail:
            msg: "No online nodes to migrate VMs to. Cannot safely update {{ inventory_hostname }}."
          when:
            - running_vms.stdout_lines | length > 0
            - migration_target.stdout | length == 0

        - name: Migrate each running VM to {{ migration_target.stdout }}
          ansible.builtin.shell:
            cmd: >
              qm migrate {{ item }} {{ migration_target.stdout }}
              --online
              --with-local-disks 0
          loop: "{{ running_vms.stdout_lines }}"
          when:
            - not dry_run
            - running_vms.stdout_lines | length > 0
            - migration_target.stdout | length > 0
          async: "{{ migrate_timeout }}"
          poll: 15
          register: migration_results

        - name: Verify no VMs remain running on this node
          ansible.builtin.shell:
            cmd: qm list 2>/dev/null | awk 'NR>1 && $3=="running" {print $1}'
          register: remaining_vms
          changed_when: false
          retries: 5
          delay: 30
          until: remaining_vms.stdout_lines | length == 0
          when: not dry_run

        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true
            force_apt_get: true
            cache_valid_time: 0
          when: not dry_run

        - name: Upgrade all packages
          ansible.builtin.apt:
            upgrade: dist
            force_apt_get: true
          when: not dry_run
          register: apt_upgrade

        - name: Run pveupgrade (Proxmox-specific packages)
          ansible.builtin.shell:
            cmd: pveupgrade --force
          when: not dry_run
          register: pveupgrade_result
          changed_when: "'upgraded' in pveupgrade_result.stdout"

        - name: Autoremove unused packages
          ansible.builtin.apt:
            autoremove: true
          when: not dry_run

        - name: Check if reboot required
          ansible.builtin.stat:
            path: /var/run/reboot-required
          register: reboot_flag

        - name: Reboot node
          ansible.builtin.reboot:
            msg: "Rebooting for Proxmox updates (Ansible)"
            pre_reboot_delay: 10
            reboot_timeout: "{{ reboot_timeout }}"
            post_reboot_delay: 60
            connect_timeout: 10
            test_command: pveversion
          when:
            - reboot_flag.stat.exists
            - not dry_run

        - name: Wait for Proxmox cluster to see node as online
          ansible.builtin.shell:
            cmd: |
              pvesh get /nodes --output-format json | python3 -c "
              import sys, json
              nodes = json.load(sys.stdin)
              node = next((n for n in nodes if n['node'] == '{{ inventory_hostname }}'), None)
              print(node['status'] if node else 'unknown')
              "
          register: node_status
          retries: 20
          delay: 30
          until: node_status.stdout == "online"
          changed_when: false

        - name: Notify completion
          ansible.builtin.uri:
            url: "{{ ntfy_url }}"
            method: POST
            headers:
              Title: "PVE Update: {{ inventory_hostname }} done"
              Priority: low
              Tags: white_check_mark
            body: |
              Update complete on {{ inventory_hostname }}
              Rebooted: {{ reboot_flag.stat.exists | string }}
              Dry run: {{ dry_run | string }}
              Time: {{ ansible_date_time.iso8601 }}
            body_format: raw
            status_code: 200
          ignore_errors: true

      rescue:
        - name: Send failure notification
          ansible.builtin.uri:
            url: "{{ ntfy_url }}"
            method: POST
            headers:
              Title: "PVE Update FAILED: {{ inventory_hostname }}"
              Priority: urgent
              Tags: rotating_light
            body: |
              Update FAILED on {{ inventory_hostname }}
              Failed task: {{ ansible_failed_task.name }}
              Manual intervention required before continuing cluster update.
              Time: {{ ansible_date_time.iso8601 }}
            body_format: raw
            status_code: 200
          ignore_errors: true

        - name: Re-raise failure (stops remaining nodes from being updated)
          ansible.builtin.fail:
            msg: "Update failed on {{ inventory_hostname }}. Cluster update halted. Resolve before re-running."
