---
- name: Configure Le Potato for netboot.xyz
  hosts: lepotato
  become: true
  # vars: # uncommented since I am pulling these from my repo instead of declaring them here
  #   docker_version: "20.10"  # optional, default latest works
  #   netbootxyz_image: "ghcr.io/netbootxyz/netboot.xyz:latest"
  #   netboot_container_name: "netbootxyz"
  #   netboot_ports:
  #     - "69:69/udp"
  #     - "80:80"
  #     - "4011:4011/udp"

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes

    - name: Install dependencies for Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg-agent
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Ensure user is in docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker Compose plugin
      apt:
        name: docker-compose-plugin
        state: present

    - name: Install git
      apt:
        name: git
        state: present

    - name: Clone IaC repository
      ansible.builtin.git:
        repo: "https://github.com/itshughboi/iac.git"
        dest: /opt/iac #desired destination. Change to /home/hughboi if desired
        version: main
        update: yes

    - name: Run netbootxyz docker compose
      community.docker.docker_compose_v2:
        project_src: /opt/iac/bootstrap/netbootxyz #if I change the `dest` above ^^, need to change reference here too
        state: present