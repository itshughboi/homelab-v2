---
# New host bootstrap — goes from a fresh Ubuntu VM to production-ready.
# Chains what would otherwise be separate core-install + hardening steps
# with everything else needed before a host is usable in the homelab.
#
# What it does:
#   1. Set hostname and timezone
#   2. Install baseline packages
#   3. Configure the hughboi user + sudo
#   4. Push SSH authorized keys
#   5. Harden SSH config
#   6. Configure chrony for NTP
#   7. Configure UFW (deny in, allow out, allow SSH)
#   8. Configure fail2ban for SSH
#   9. Enable unattended-upgrades for security patches
#  10. Set MOTD
#  11. Configure journald size limit
#  12. Optional: install Docker (set install_docker: true)
#  13. Optional: join k3s cluster (set join_k3s: true)
#
# Run immediately after cloning a Proxmox template or `terraform apply`.
# Idempotent — safe to re-run.

- name: Bootstrap new host
  hosts: new_hosts
  gather_facts: true
  become: true

  vars:
    hostname: "{{ inventory_hostname }}"
    timezone: "America/Denver"
    ansible_user_name: hughboi
    ntfy_url: "https://ntfy.hughboi.cc/homelab"

    # SSH public key to authorize (populate via extra-vars or group_vars)
    ssh_public_key: "ssh-ed25519 AAAAC3... hughboi@homelab"

    # UFW — ports to allow in addition to SSH
    ufw_allow_ports:
      - "22"

    # Optional features
    install_docker: false
    join_k3s: false
    k3s_server_url: "https://10.10.30.1:6443"
    k3s_token: ""            # populate via Semaphore secret / --extra-vars

    base_packages:
      - vim
      - curl
      - wget
      - git
      - htop
      - btop
      - tmux
      - unzip
      - jq
      - net-tools
      - iproute2
      - dnsutils
      - nmap
      - mtr-tiny
      - iperf3
      - ethtool
      - smartmontools
      - chrony
      - fail2ban
      - ufw
      - unattended-upgrades
      - apt-listchanges
      - logrotate
      - ca-certificates
      - gnupg
      - lsb-release

  tasks:
    - name: Bootstrap
      block:
        - name: Set hostname
          ansible.builtin.hostname:
            name: "{{ hostname }}"

        - name: Update /etc/hosts with hostname
          ansible.builtin.lineinfile:
            path: /etc/hosts
            regexp: '^127\.0\.1\.1'
            line: "127.0.1.1 {{ hostname }}"
            state: present

        - name: Set timezone
          community.general.timezone:
            name: "{{ timezone }}"

        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

        - name: Upgrade all packages
          ansible.builtin.apt:
            upgrade: dist
            force_apt_get: true

        - name: Install base packages
          ansible.builtin.apt:
            name: "{{ base_packages }}"
            state: present

        - name: Autoremove unused packages
          ansible.builtin.apt:
            autoremove: true

        - name: Ensure user exists
          ansible.builtin.user:
            name: "{{ ansible_user_name }}"
            shell: /bin/bash
            groups: sudo
            append: true
            create_home: true
            state: present

        - name: Allow sudo without password for user
          ansible.builtin.copy:
            content: "{{ ansible_user_name }} ALL=(ALL) NOPASSWD:ALL\n"
            dest: "/etc/sudoers.d/{{ ansible_user_name }}"
            mode: "0440"
            validate: visudo -cf %s

        - name: Push authorized SSH key
          ansible.posix.authorized_key:
            user: "{{ ansible_user_name }}"
            key: "{{ ssh_public_key }}"
            state: present
            exclusive: false

        - name: Harden SSH config
          ansible.builtin.blockinfile:
            path: /etc/ssh/sshd_config
            marker: "# {mark} ANSIBLE MANAGED - hardening"
            block: |
              PasswordAuthentication no
              PermitRootLogin no
              PermitEmptyPasswords no
              X11Forwarding no
              MaxAuthTries 3
              LoginGraceTime 30
              ClientAliveInterval 300
              ClientAliveCountMax 2
          notify: Restart sshd

        - name: Configure chrony NTP
          ansible.builtin.copy:
            content: |
              pool time.cloudflare.com iburst
              pool pool.ntp.org iburst
              driftfile /var/lib/chrony/drift
              makestep 1.0 3
              rtcsync
              logdir /var/log/chrony
            dest: /etc/chrony/chrony.conf
            mode: "0644"
          notify: Restart chrony

        - name: Enable and start chrony
          ansible.builtin.systemd:
            name: chrony
            enabled: true
            state: started

        - name: Reset UFW to defaults
          community.general.ufw:
            state: reset

        - name: Set UFW default policies
          community.general.ufw:
            direction: "{{ item.direction }}"
            policy: "{{ item.policy }}"
          loop:
            - {direction: incoming, policy: deny}
            - {direction: outgoing, policy: allow}
            - {direction: routed,   policy: deny}

        - name: Allow configured ports
          community.general.ufw:
            rule: allow
            port: "{{ item }}"
            proto: tcp
          loop: "{{ ufw_allow_ports }}"

        - name: Enable UFW
          community.general.ufw:
            state: enabled

        - name: Configure fail2ban for SSH
          ansible.builtin.copy:
            content: |
              [sshd]
              enabled = true
              port = ssh
              filter = sshd
              backend = systemd
              maxretry = 5
              bantime = 3600
              findtime = 600
            dest: /etc/fail2ban/jail.d/sshd.conf
            mode: "0644"
          notify: Restart fail2ban

        - name: Enable and start fail2ban
          ansible.builtin.systemd:
            name: fail2ban
            enabled: true
            state: started

        - name: Configure unattended-upgrades (security patches only)
          ansible.builtin.copy:
            content: |
              Unattended-Upgrade::Allowed-Origins {
                "${distro_id}:${distro_codename}-security";
              };
              Unattended-Upgrade::AutoFixInterruptedDpkg "true";
              Unattended-Upgrade::Remove-Unused-Dependencies "true";
              Unattended-Upgrade::Automatic-Reboot "false";
            dest: /etc/apt/apt.conf.d/50unattended-upgrades
            mode: "0644"

        - name: Enable unattended-upgrades
          ansible.builtin.copy:
            content: |
              APT::Periodic::Update-Package-Lists "1";
              APT::Periodic::Unattended-Upgrade "1";
            dest: /etc/apt/apt.conf.d/20auto-upgrades
            mode: "0644"

        - name: Set journald size limit
          ansible.builtin.lineinfile:
            path: /etc/systemd/journald.conf
            regexp: '^#?SystemMaxUse='
            line: 'SystemMaxUse=500M'
          notify: Restart journald

        - name: Set MOTD
          ansible.builtin.copy:
            content: |
              ╔══════════════════════════════════════════╗
              ║  {{ inventory_hostname }}
              ║  Managed by Ansible / Semaphore
              ║  Unauthorized access prohibited
              ╚══════════════════════════════════════════╝
            dest: /etc/motd
            mode: "0644"

        - name: Disable default Ubuntu MOTD noise
          ansible.builtin.file:
            path: "{{ item }}"
            mode: "0644"
            state: touch
          loop:
            - /etc/motd.d/.ansible-managed
          ignore_errors: true

        # ── Optional: Docker ───────────────────────────────────────────────
        - name: Install Docker
          when: install_docker
          block:
            - name: Add Docker GPG key
              ansible.builtin.shell:
                cmd: |
                  curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                    gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                creates: /etc/apt/keyrings/docker.gpg

            - name: Add Docker apt repo
              ansible.builtin.apt_repository:
                repo: >
                  deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
                  https://download.docker.com/linux/ubuntu
                  {{ ansible_distribution_release }} stable
                state: present

            - name: Install Docker packages
              ansible.builtin.apt:
                name:
                  - docker-ce
                  - docker-ce-cli
                  - containerd.io
                  - docker-compose-plugin
                update_cache: true
                state: present

            - name: Add user to docker group
              ansible.builtin.user:
                name: "{{ ansible_user_name }}"
                groups: docker
                append: true

        # ── Optional: k3s join ────────────────────────────────────────────
        - name: Join k3s cluster as agent
          when: join_k3s and k3s_token | length > 0
          ansible.builtin.shell:
            cmd: >
              curl -sfL https://get.k3s.io |
              K3S_URL={{ k3s_server_url }}
              K3S_TOKEN={{ k3s_token }}
              sh -
          args:
            creates: /var/lib/rancher/k3s/agent/kubelet.kubeconfig

        - name: Send completion notification
          ansible.builtin.uri:
            url: "{{ ntfy_url }}"
            method: POST
            headers:
              Title: "Bootstrap complete: {{ inventory_hostname }}"
              Priority: low
              Tags: white_check_mark
            body: |
              New host bootstrapped: {{ inventory_hostname }} ({{ ansible_default_ipv4.address }})
              OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
              Docker installed: {{ install_docker | string }}
              k3s joined: {{ join_k3s | string }}
              Time: {{ ansible_date_time.iso8601 }}
            body_format: raw
            status_code: 200
          ignore_errors: true

      rescue:
        - name: Alert on failure
          ansible.builtin.uri:
            url: "{{ ntfy_url }}"
            method: POST
            headers:
              Title: "Bootstrap FAILED: {{ inventory_hostname }}"
              Priority: urgent
              Tags: rotating_light
            body: |
              Bootstrap failed on {{ inventory_hostname }}
              Failed task: {{ ansible_failed_task.name }}
              Time: {{ ansible_date_time.iso8601 }}
            body_format: raw
            status_code: 200
          ignore_errors: true

        - name: Re-raise
          ansible.builtin.fail:
            msg: "Bootstrap failed: {{ ansible_failed_task.name }}"

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    - name: Restart chrony
      ansible.builtin.systemd:
        name: chrony
        state: restarted

    - name: Restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted

    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
