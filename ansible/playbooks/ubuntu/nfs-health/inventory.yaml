---
# Run against hosts that have NFS mounts in fstab.
# Hosts without NFS entries will report "None" and pass cleanly.

all:
  vars:
    ansible_user: hughboi
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519

  hosts:
    docker:
      ansible_host: 10.10.10.10
    k3s-master-1:
      ansible_host: 10.10.30.1
    k3s-worker-1:
      ansible_host: 10.10.30.11
    k3s-worker-2:
      ansible_host: 10.10.30.12
    k3s-worker-3:
      ansible_host: 10.10.30.13
