---
# Run against physical hosts only — VMs don't have direct SMART access.
# For Proxmox, SMART data is on the hypervisor node, not inside the VM.

all:
  vars:
    ansible_user: hughboi
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519

  hosts:
    pve-srv-1:
      ansible_host: 10.10.10.1
    pve-srv-2:
      ansible_host: 10.10.10.2
    pve-srv-3:
      ansible_host: 10.10.10.3
    pve-srv-4:
      ansible_host: 10.10.10.4
