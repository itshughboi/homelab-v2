---
all:
  vars:
    ansible_user: hughboi
    ansible_ssh_private_key_file: ~/.ssh/homelab-athena_id_ed25519

  hosts:
    # Proxmox hosts are root-only over SSH — no separate hughboi user exists there
    # (confirmed: `id hughboi` on pve-srv-1 returns "no such user"). Override per-host.
    # ansible_become: false too — main.yaml sets become: true at the play level, but
    # Proxmox hosts have no sudo binary at all (confirmed: `which sudo` exit 1 on
    # pve-srv-1); shell/command tasks fail outright trying to invoke it, even though
    # the connection is already root. Host vars beat play-level become.
    pve-srv-1:
      ansible_host: 10.10.10.1
      ansible_user: root
      ansible_become: false
    pve-srv-2:
      ansible_host: 10.10.10.2
      ansible_user: root
      ansible_become: false
    pve-srv-3:
      ansible_host: 10.10.10.3
      ansible_user: root
      ansible_become: false
    pve-srv-4:
      ansible_host: 10.10.10.4
      ansible_user: root
      ansible_become: false
    docker:
      ansible_host: 10.10.10.10
    k3s-master-1:
      ansible_host: 10.10.30.1
    k3s-master-2:
      ansible_host: 10.10.30.2
    k3s-master-3:
      ansible_host: 10.10.30.3
