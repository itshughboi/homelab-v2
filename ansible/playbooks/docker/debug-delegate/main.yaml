---
# TEMPORARY debug playbook — isolating a Semaphore-specific bug where a
# delegate_to: localhost task immediately following another delegate_to:
# localhost task gets silently skipped. Delete once understood.
- name: Debug consecutive delegate_to localhost
  hosts: docker_hosts
  gather_facts: false
  become: true

  vars:
    controller_repo_dir: "{{ (playbook_dir + '/../../../..') | realpath }}"
    sops_config: "{{ controller_repo_dir }}/.sops.yaml"
    controller_env_file: "/tmp/debug-sops-test-{{ service }}.env"

  tasks:
    - name: Fail fast if no service was specified
      ansible.builtin.fail:
        msg: "Pass -e service=<name>"
      when: service is not defined
      delegate_to: localhost

    - name: Pull latest repo on target host
      ansible.builtin.git:
        repo: https://gitea.hughboi.cc/hughboi/homelab.git
        dest: /home/hughboi/homelab
        version: main
        update: true
      become: false

    - name: Check for .env.sops on the controller (Athena)
      ansible.builtin.stat:
        path: "{{ controller_repo_dir }}/apps/docker/{{ service }}/.env.sops"
      delegate_to: localhost
      become: false
      register: sops_file
      failed_when: not sops_file.stat.exists

    - name: First delegated task
      ansible.builtin.command:
        cmd: echo "first task ran"
      delegate_to: localhost
      become: false
      changed_when: false
      register: first_result

    - name: Second delegated task
      ansible.builtin.command:
        cmd: echo "second task ran"
      delegate_to: localhost
      become: false
      changed_when: false
      register: second_result

    - name: Show both results
      ansible.builtin.debug:
        msg:
          - "first: {{ first_result.stdout | default('MISSING') }}"
          - "second: {{ second_result.stdout | default('MISSING') }}"

    - name: Real sops decrypt command, same as sops-deploy
      ansible.builtin.command:
        cmd: >
          sops --decrypt --config {{ sops_config }}
          --input-type dotenv --output-type dotenv
          --output {{ controller_env_file }}
          {{ controller_repo_dir }}/apps/docker/{{ service }}/.env.sops
      delegate_to: localhost
      become: false
      changed_when: false
      register: sops_result

    - name: Show sops result
      ansible.builtin.debug:
        msg:
          - "rc: {{ sops_result.rc | default('MISSING') }}"
          - "stdout: {{ sops_result.stdout | default('MISSING') }}"
          - "stderr: {{ sops_result.stderr | default('MISSING') }}"

    - name: Check if the output file exists
      ansible.builtin.stat:
        path: "{{ controller_env_file }}"
      delegate_to: localhost
      become: false
      register: output_check

    - name: Show whether file exists
      ansible.builtin.debug:
        msg: "output file exists: {{ output_check.stat.exists }}"
