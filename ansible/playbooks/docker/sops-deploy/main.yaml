---
# Deploy a Docker Compose service on a remote host, with SOPS-encrypted secrets
# decrypted on the controller (Athena) only — the private age key never leaves
# Athena, and the target host never needs sops/age installed at all.
#
# Equivalent of running `./scripts/sops-run.sh <service> up -d` by hand on the
# target host, but driven from Semaphore over SSH — no manual server access.
#
# Usage (Semaphore Task Template — prompt for `service` as an extra var):
#   ansible-playbook -i inventory.yaml main.yaml -e service=gatus
#
# Requires: apps/docker/<service>/.env.sops must already exist (run
# ./scripts/sops-migrate.sh <service> once, from a machine with the age key,
# before the first sops-deploy run for a given service).
#
# Some services (e.g. mailrise) bake secrets directly into a config file
# instead of reading them from env vars — for those, apps/docker/<service>/
# has one or more <filename>.<ext>.sops files instead of (or alongside)
# .env.sops, and this playbook decrypts each straight to <filename>.<ext> on
# the target host (strips the trailing ".sops" only — mailrise.conf.sops ->
# mailrise.conf). There's no migrate-script equivalent for this yet —
# encrypt by hand with:
#   sops --encrypt --config .sops.yaml apps/docker/<service>/<filename>.<ext> \
#     > apps/docker/<service>/<filename>.<ext>.sops
#
# Do NOT run this via Semaphore's "Dry Run" option. Dry run = Ansible check
# mode, and ansible.builtin.command (used for the sops decrypt task) doesn't
# support check mode — it just reports "skipping" with no error, which then
# cascades into "Copy decrypted env file to the target host" failing with
# "Could not find or access '/tmp/sops-deploy-<service>.env' on the Ansible
# Controller". A normal (non-dry-run) task run works fine. Cost a long
# debugging session before the cause was traced to dry-run mode rather than
# anything in this playbook.

- name: Deploy a Docker Compose service with SOPS secrets
  hosts: docker_hosts
  gather_facts: false
  become: true

  vars:
    # remote_repo_dir: fixed path on the target host (dock-prod) — that's a real,
    # permanent clone we manage.
    #
    # controller_repo_dir: NOT a fixed path. When Semaphore runs this playbook, the
    # "controller" (wherever delegate_to: localhost actually lands — Athena, since
    # that's where Semaphore/Ansible run) is Semaphore's own per-task checkout, at
    # a path like /tmp/semaphore/project_1/repository_1_template_2/ — a different,
    # unpredictable directory every run, NOT /home/hughboi/homelab. Derive it from
    # playbook_dir, which Ansible sets correctly regardless of checkout path.
    remote_repo_dir: /home/hughboi/homelab
    controller_repo_dir: "{{ (playbook_dir + '/../../../..') | realpath }}"
    sops_config: "{{ controller_repo_dir }}/.sops.yaml"
    # Decrypted secrets never pass through a `register`'d Ansible variable at all
    # — decrypt straight to a file on disk, so nothing sensitive is ever held in
    # a fact that Semaphore's log streaming could capture.
    controller_env_file: "/tmp/sops-deploy-{{ service }}.env"
    # docker_compose_v2's env_files param resolves relative to project_src, and by
    # default docker compose already looks for exactly this filename there — so
    # this doubles as "the normal .env docker compose reads" and "the thing we
    # clean up after," no env_files: param needed on the deploy task at all.
    remote_env_file: "{{ remote_repo_dir }}/apps/docker/{{ service }}/.env"
    service_dir: "{{ controller_repo_dir }}/apps/docker/{{ service }}"

  tasks:
    - name: Fail fast if no service was specified
      ansible.builtin.fail:
        msg: "Pass -e service=<name> (matches apps/docker/<name>/), e.g. -e service=gatus"
      when: service is not defined
      delegate_to: localhost

    - name: Pull latest repo on target host
      ansible.builtin.git:
        repo: https://gitea.hughboi.cc/hughboi/homelab.git
        dest: "{{ remote_repo_dir }}"
        version: main
        update: true
      become: false

    - name: Check for .env.sops on the controller (Athena)
      ansible.builtin.stat:
        path: "{{ service_dir }}/.env.sops"
      delegate_to: localhost
      become: false
      register: sops_env_file

    # Config-as-secret services (e.g. mailrise) commit <filename>.<ext>.sops
    # instead of .env.sops — find any of those for this service. Excludes
    # .env.sops itself (handled separately above) via the patterns regex.
    - name: Check for *.sops config files on the controller (Athena)
      ansible.builtin.find:
        paths: "{{ service_dir }}"
        patterns: '^(?!\.env\.sops$).*\.sops$'
        use_regex: true
      delegate_to: localhost
      become: false
      register: sops_config_files

    - name: Fail if neither .env.sops nor a *.sops config file exists
      ansible.builtin.fail:
        msg: >
          No apps/docker/{{ service }}/.env.sops and no *.sops config file
          found. Run ./scripts/sops-migrate.sh {{ service }} (for a plain
          .env) or encrypt a config file by hand (see comment at top of this
          playbook) first.
      delegate_to: localhost
      when: not sops_env_file.stat.exists and sops_config_files.matched == 0

    - name: Decrypt .env.sops to a temp file on the controller
      ansible.builtin.command:
        cmd: >
          sops --decrypt --config {{ sops_config }}
          --input-type dotenv --output-type dotenv
          --output {{ controller_env_file }}
          {{ service_dir }}/.env.sops
      delegate_to: localhost
      become: false
      changed_when: false
      when: sops_env_file.stat.exists

    - name: Copy decrypted env file to the target host
      ansible.builtin.copy:
        src: "{{ controller_env_file }}"
        dest: "{{ remote_env_file }}"
        mode: "0600"
      when: sops_env_file.stat.exists

    # Decrypt each *.sops config file straight to its real filename (strip
    # the trailing ".sops" — mailrise.conf.sops -> mailrise.conf) on the
    # controller, then copy it out to the same relative path on the target
    # host. Loops so a service can have more than one.
    - name: Decrypt config-secret files to the controller
      ansible.builtin.command:
        cmd: >
          sops --decrypt --config {{ sops_config }}
          --output /tmp/sops-deploy-{{ service }}-{{ item.path | basename | replace('.sops', '') }}
          {{ item.path }}
      loop: "{{ sops_config_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"
      delegate_to: localhost
      become: false
      changed_when: false
      when: sops_config_files.matched > 0

    - name: Copy decrypted config-secret files to the target host
      ansible.builtin.copy:
        src: "/tmp/sops-deploy-{{ service }}-{{ item.path | basename | replace('.sops', '') }}"
        dest: "{{ remote_repo_dir }}/apps/docker/{{ service }}/{{ item.path | basename | replace('.sops', '') }}"
        mode: "0600"
      loop: "{{ sops_config_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: sops_config_files.matched > 0

    - name: Deploy via docker compose on the target host
      community.docker.docker_compose_v2:
        project_src: "{{ remote_repo_dir }}/apps/docker/{{ service }}"
        state: present
        pull: always

    - name: Remove decrypted env file from the target host
      ansible.builtin.file:
        path: "{{ remote_env_file }}"
        state: absent
      when: sops_env_file.stat.exists

    - name: Remove decrypted env file from the controller
      ansible.builtin.file:
        path: "{{ controller_env_file }}"
        state: absent
      delegate_to: localhost
      become: false
      when: sops_env_file.stat.exists

    - name: Remove decrypted config-secret files from the controller
      ansible.builtin.file:
        path: "/tmp/sops-deploy-{{ service }}-{{ item.path | basename | replace('.sops', '') }}"
        state: absent
      loop: "{{ sops_config_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"
      delegate_to: localhost
      become: false
      when: sops_config_files.matched > 0

    # Config-secret files stay decrypted on the target host between deploys
    # (mailrise reads its config from disk continuously, unlike .env which
    # docker compose only reads at container-start time) — not cleaned up
    # after deploy the way .env is.
