---
# Deploy a Docker Compose service on a remote host, with SOPS-encrypted secrets
# decrypted on the controller (Athena) only — the private age key never leaves
# Athena, and the target host never needs sops/age installed at all.
#
# Equivalent of running `./scripts/sops-run.sh <service> up -d` by hand on the
# target host, but driven from Semaphore over SSH — no manual server access.
#
# Usage (Semaphore Task Template — prompt for `service` as an extra var):
#   ansible-playbook -i inventory.yaml main.yaml -e service=gatus
#
# Requires: apps/docker/<service>/.env.sops must already exist (run
# ./scripts/sops-migrate.sh <service> once, from a machine with the age key,
# before the first sops-deploy run for a given service).

- name: Deploy a Docker Compose service with SOPS secrets
  hosts: docker_hosts
  gather_facts: false
  become: true

  vars:
    # remote_repo_dir: fixed path on the target host (dock-prod) — that's a real,
    # permanent clone we manage.
    #
    # controller_repo_dir: NOT a fixed path. When Semaphore runs this playbook, the
    # "controller" (wherever delegate_to: localhost actually lands — Athena, since
    # that's where Semaphore/Ansible run) is Semaphore's own per-task checkout, at
    # a path like /tmp/semaphore/project_1/repository_1_template_2/ — a different,
    # unpredictable directory every run, NOT /home/hughboi/homelab. Derive it from
    # playbook_dir, which Ansible sets correctly regardless of checkout path.
    remote_repo_dir: /home/hughboi/homelab
    controller_repo_dir: "{{ (playbook_dir + '/../../../..') | realpath }}"
    sops_config: "{{ controller_repo_dir }}/.sops.yaml"
    # Decrypted secrets never pass through a `register`'d Ansible variable at all.
    # Two separate real bugs led here, both specific to running via Semaphore (an
    # identical playbook via plain `ansible-playbook` from a shell worked every
    # time in both cases):
    #   1. no_log: true on a task whose result Ansible needs internally broke
    #      execution — the next task saw empty input instead of the real value.
    #   2. Even with no_log removed, run_once: true + delegate_to: localhost on
    #      a task following an earlier skipped task caused Semaphore to skip it
    #      too, with no error — Ansible's own `-vv` output confirmed this never
    #      happens outside Semaphore.
    # Both point at something in Semaphore's own execution/streaming layer, not
    # our playbook logic — worked around by removing run_once entirely (no
    # practical benefit with a single host anyway) and never registering
    # anything sensitive in the first place.
    controller_env_file: "/tmp/sops-deploy-{{ service }}.env"
    # docker_compose_v2's env_files param resolves relative to project_src, and by
    # default docker compose already looks for exactly this filename there — so
    # this doubles as "the normal .env docker compose reads" and "the thing we
    # clean up after," no env_files: param needed on the deploy task at all.
    remote_env_file: "{{ remote_repo_dir }}/apps/docker/{{ service }}/.env"

  tasks:
    - name: Fail fast if no service was specified
      ansible.builtin.fail:
        msg: "Pass -e service=<name> (matches apps/docker/<name>/), e.g. -e service=gatus"
      when: service is not defined
      delegate_to: localhost

    - name: Pull latest repo on target host
      ansible.builtin.git:
        repo: https://gitea.hughboi.cc/hughboi/homelab.git
        dest: "{{ remote_repo_dir }}"
        version: main
        update: true
      become: false

    # Combined check-and-fail into one task (failed_when, not a separate fail:
    # task) — a standalone `ansible.builtin.fail` task gated by `when:` on this
    # stat's result, run via delegate_to: localhost right before another
    # delegate_to: localhost task, reproducibly caused Semaphore (not plain
    # ansible-playbook) to silently skip the *next* task with no error at all.
    # Root cause not fully understood — something in Semaphore's own execution
    # layer around consecutive delegated tasks — worked around structurally by
    # not having two delegate_to: localhost tasks in a row with a when: between
    # them. If this task fails, it means apps/docker/{{ service }}/.env.sops
    # doesn't exist — run ./scripts/sops-migrate.sh {{ service }} first.
    - name: Check for .env.sops on the controller (Athena)
      ansible.builtin.stat:
        path: "{{ controller_repo_dir }}/apps/docker/{{ service }}/.env.sops"
      delegate_to: localhost
      become: false
      register: sops_file
      failed_when: not sops_file.stat.exists

    # Decrypt straight to a file, dotenv-to-dotenv (docker compose's env_files
    # param reads a real .env file natively — no JSON/dict conversion needed at
    # all this way). Output is on disk, never captured as a task result/fact.
    - name: Decrypt .env.sops to a temp file on the controller
      ansible.builtin.command:
        cmd: >
          sops --decrypt --config {{ sops_config }}
          --input-type dotenv --output-type dotenv
          --output {{ controller_env_file }}
          {{ controller_repo_dir }}/apps/docker/{{ service }}/.env.sops
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Copy decrypted env file to the target host
      ansible.builtin.copy:
        src: "{{ controller_env_file }}"
        dest: "{{ remote_env_file }}"
        mode: "0600"

    - name: Deploy via docker compose on the target host
      community.docker.docker_compose_v2:
        project_src: "{{ remote_repo_dir }}/apps/docker/{{ service }}"
        state: present
        pull: always

    - name: Remove decrypted env file from the target host
      ansible.builtin.file:
        path: "{{ remote_env_file }}"
        state: absent

    - name: Remove decrypted env file from the controller
      ansible.builtin.file:
        path: "{{ controller_env_file }}"
        state: absent
      delegate_to: localhost
      become: false
