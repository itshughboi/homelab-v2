unifi_networks:
  # --- Core Infrastructure ---
  management:
    vlan: 10
    subnet: "10.10.10.0/24"
    gateway: "10.10.10.254"
    dhcp_start: "10.10.10.100"
    dhcp_stop: "10.10.10.200"

  # --- Internal High-Performance (No Gateway/DHCP) ---
  cluster:
    vlan: 20
    subnet: "10.10.20.0/24"
    dhcp_enabled: false

  storage:
    vlan: 40
    subnet: "10.10.40.0/24"
    dhcp_enabled: false

  # --- Routed App Networks ---
  k3s:
    vlan: 30
    subnet: "10.10.30.0/24"
    gateway: "10.10.30.254"
    # Pool starts at .200 — lower range reserved for static node/MetalLB IPs
    dhcp_start: "10.10.30.200"
    dhcp_stop: "10.10.30.220"

  iot:
    vlan: 50
    subnet: "10.10.50.0/24"
    gateway: "10.10.50.254"
    dhcp_start: "10.10.50.10"
    dhcp_stop: "10.10.50.200"

  # --- VPN Networks ---
  tailscale:
    vlan: 80
    subnet: "10.10.80.0/24"
    gateway: "10.10.80.254"
    dhcp_start: "10.10.80.1"
    dhcp_stop: "10.10.80.20"

  # NOTE: WireGuard VPN (VLAN 81) is configured via UniFi VPN Server UI, not this module.
  # The community.general.unifi_network module does not support WireGuard VPN server creation.
  # wireguard: vlan 81 / 10.10.81.0/24 — configure manually in Settings → VPN → VPN Server

  # --- Isolated Networks ---
  torrent:
    vlan: 49
    subnet: "172.16.20.0/24"
    gateway: "172.16.20.254"
    dhcp_start: "172.16.20.1"
    dhcp_stop: "172.16.20.20"

  # --- Provisioning (PXE boot) ---
  provisioning:
    vlan: 99
    subnet: "10.10.99.0/24"
    gateway: "10.10.99.254"
    dhcp_start: "10.10.99.1"
    dhcp_stop: "10.10.99.200"
    pxe_server: "10.10.99.99"
    pxe_file: "ipxe.efi"
