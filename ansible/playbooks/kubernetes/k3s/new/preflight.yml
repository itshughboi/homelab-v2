---
# preflight.yml — Run this BEFORE site.yml to validate readiness.
# Checks connectivity, vault setup, and required variables.
# Does not make any changes to the nodes.
#
# Usage:
#   ansible-playbook -i inventory.yaml preflight.yml --ask-vault-pass
#   ansible-playbook -i inventory.yaml preflight.yml --vault-password-file ~/.vault_pass

- name: Preflight — Connectivity Check
  hosts: k3s_all
  gather_facts: false
  tasks:
    - name: Check SSH connectivity to all nodes
      ansible.builtin.ping:
      tags: connectivity

    - name: Check nodes are Ubuntu (required for apt tasks)
      ansible.builtin.raw: "cat /etc/os-release | grep '^ID='"
      register: os_check
      changed_when: false
      tags: os

    - name: Fail if not Ubuntu/Debian
      ansible.builtin.assert:
        that:
          - "'ubuntu' in os_check.stdout or 'debian' in os_check.stdout"
        fail_msg: "{{ inventory_hostname }} is not Ubuntu/Debian. These playbooks require apt."
      tags: os

    - name: Check disk space on / (minimum 20GB free)
      ansible.builtin.raw: "df / --output=avail | tail -1"
      register: disk_space
      changed_when: false
      tags: disk

    - name: Fail if less than 20GB free on root
      ansible.builtin.assert:
        that:
          - disk_space.stdout | trim | int > 20971520   # 20GB in KB
        fail_msg: >
          {{ inventory_hostname }} has less than 20GB free on /.
          k3s requires adequate disk space for images and etcd snapshots.
      tags: disk

    - name: Check RAM (minimum 2GB for workers, 4GB for masters)
      ansible.builtin.raw: "free -m | grep '^Mem:' | awk '{print $2}'"
      register: ram_mb
      changed_when: false
      tags: hardware

    - name: Warn if master has less than 4GB RAM
      ansible.builtin.debug:
        msg: "WARNING: {{ inventory_hostname }} has {{ ram_mb.stdout | trim }}MB RAM — masters need at least 4GB"
      when:
        - inventory_hostname in groups['k3s_masters']
        - ram_mb.stdout | trim | int < 3800
      tags: hardware

    - name: Confirm nodes are reachable
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} ({{ ansible_host }}) — OK"
      tags: connectivity

- name: Preflight — Variable Validation
  hosts: k3s_masters[0]
  gather_facts: false
  tasks:
    - name: Verify vault secret is loaded
      ansible.builtin.assert:
        that:
          - vault_k3s_cluster_secret is defined
          - vault_k3s_cluster_secret | length >= 32
          - vault_k3s_cluster_secret != "REPLACE_WITH_OUTPUT_OF_openssl_rand_-hex_32"
        fail_msg: |
          vault_k3s_cluster_secret is not set or is still the placeholder value.
          To fix:
            1. ansible-vault edit group_vars/vault.yml
            2. Set vault_k3s_cluster_secret to the output of: openssl rand -hex 32
            3. Save and re-run preflight
      tags: vault

    - name: Verify k3s_version is set and looks valid
      ansible.builtin.assert:
        that:
          - k3s_version is defined
          - k3s_version is match("^v[0-9]+\.[0-9]+\.[0-9]+\+k3s[0-9]+$")
        fail_msg: >
          k3s_version '{{ k3s_version }}' does not match expected format vX.Y.Z+k3sN.
          Example: v1.31.4+k3s1
      tags: vars

    - name: Verify VIP address is set
      ansible.builtin.assert:
        that:
          - k3s_api_vip is defined
          - k3s_api_vip is match("^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$")
        fail_msg: "k3s_api_vip '{{ k3s_api_vip }}' is not a valid IP address."
      tags: vars

    - name: Verify network interface is set
      ansible.builtin.assert:
        that:
          - vip_interface is defined
          - vip_interface | length > 0
        fail_msg: "vip_interface is not set. Check group_vars/all.yml."
      tags: vars

    - name: Preflight passed — summary
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════
           Preflight checks passed ✓
          ═══════════════════════════════════════════════════
           k3s version:   {{ k3s_version }}
           API VIP:       {{ k3s_api_vip }}:{{ k3s_api_port }}
           VIP interface: {{ vip_interface }}
           kube-vip:      {{ kube_vip_version }}
           Init node:     {{ groups['k3s_masters'][0] }}
           Masters:       {{ groups['k3s_masters'] | join(', ') }}
           Workers:       {{ groups['k3s_workers'] | join(', ') }}
           Longhorn:      {{ groups['k3s_longhorn'] | join(', ') }}
          ═══════════════════════════════════════════════════
           Ready to run: ansible-playbook -i inventory.yaml site.yml
          ═══════════════════════════════════════════════════
      tags: summary
