---
# longhorn-prereqs/tasks/main.yml
# Runs only on k3s_longhorn nodes (dedicated storage nodes).
# These nodes have a second disk (150GB on top of the 50GB OS disk) used by Longhorn.
# Idempotent — safe to re-run.

# ── Verify second disk exists ─────────────────────────────────────────────────
# The Longhorn disk should be /dev/sdb (or /dev/vdb on QEMU).
# We detect it rather than hardcoding to handle different hypervisors.

- name: Gather disk facts
  ansible.builtin.setup:
    gather_subset:
      - hardware
  tags: always

- name: Find the Longhorn data disk (largest non-OS disk)
  ansible.builtin.set_fact:
    longhorn_disk: >-
      {{
        ansible_devices
        | dict2items
        | selectattr('value.model', 'defined')
        | rejectattr('key', 'match', '^loop')
        | sort(attribute='value.size', reverse=true)
        | map(attribute='key')
        | list
        | last
      }}
  tags: disk

- name: Show detected Longhorn disk
  ansible.builtin.debug:
    msg: "Longhorn data disk detected: /dev/{{ longhorn_disk }}"
  tags: disk

# ── Format and mount Longhorn disk ────────────────────────────────────────────
# Longhorn manages its own data on the raw disk, but it needs a filesystem
# mount point to report to the scheduler. We use ext4 on the full disk.

- name: Create filesystem on Longhorn disk (only if not already formatted)
  community.general.filesystem:
    fstype: ext4
    dev: "/dev/{{ longhorn_disk }}"
    opts: "-L longhorn-data"
    # force: false means this won't reformat an existing filesystem — safe
  tags: disk

- name: Create Longhorn mount directory
  ansible.builtin.file:
    path: /var/lib/longhorn
    state: directory
    mode: "0750"
  tags: disk

- name: Mount Longhorn disk persistently (via fstab)
  ansible.posix.mount:
    path: /var/lib/longhorn
    src: "LABEL=longhorn-data"
    fstype: ext4
    opts: defaults,noatime
    state: mounted
  tags: disk

# ── iSCSI configuration for Longhorn ─────────────────────────────────────────
# On storage nodes, iSCSI is more critical — Longhorn uses it for volume replication.

- name: Ensure iscsid is running (should be from prereqs, verify here)
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started
  tags: iscsi

- name: Set iSCSI initiator name (unique per node — uses hostname)
  ansible.builtin.copy:
    dest: /etc/iscsi/initiatorname.iscsi
    content: |
      ## Generated by Ansible
      InitiatorName=iqn.2004-10.com.ubuntu:01:{{ inventory_hostname | replace('-', '') }}
    mode: "0600"
  notify: restart iscsid
  tags: iscsi

# ── Longhorn disk configuration ───────────────────────────────────────────────
# Tell Longhorn to use /var/lib/longhorn as the data path.
# This is done via a node config file that Longhorn reads on startup.

- name: Create Longhorn node disk config directory
  ansible.builtin.file:
    path: /etc/longhorn
    state: directory
    mode: "0755"
  tags: longhorn

- name: Write Longhorn disk config
  ansible.builtin.copy:
    dest: /etc/longhorn/disks.json
    content: |
      {
        "longhorn-data": {
          "path": "/var/lib/longhorn",
          "allowScheduling": true
        }
      }
    mode: "0644"
  tags: longhorn

# ── Node label prep ───────────────────────────────────────────────────────────
# After k3s is running, the post-install role applies node labels.
# This task just documents what labels will be applied (for reference).

- name: Document Longhorn node labels (applied by post-install role)
  ansible.builtin.debug:
    msg: |
      After k3s is running, post-install will apply:
        kubectl label node {{ inventory_hostname }} \
          {{ longhorn_node_label_key }}={{ longhorn_node_label_value }} \
          node-role.longhorn.io/storage=true
  tags: longhorn
