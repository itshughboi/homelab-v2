name: Validate

# Mirror of .gitea/workflows/ci.yaml (minus Gitea-only jobs: sops-coverage, docs-build, trivy).
# GitHub is the active remote today, so this is the enforcement that actually runs on every
# push. Keep job logic in sync with the Gitea workflow when editing either.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML
        run: |
          yamllint -d '{
            extends: relaxed,
            rules: {
              line-length: {max: 200},
              truthy: {allowed-values: ["true", "false", "yes", "no"]},
              comments: disable,
              document-start: disable
            }
          }' apps/kubernetes/ ansible/ bootstrap/

  kubeconform:
    name: Kubernetes Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=v0.6.7
          curl -sSLo /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          chmod +x /usr/local/bin/kubeconform
      - name: Validate k8s manifests
        run: |
          find apps/kubernetes/k3s/apps \
               apps/kubernetes/k3s/infra \
               apps/kubernetes/k3s/networking \
               apps/kubernetes/k3s/monitoring \
               apps/kubernetes/k3s/argocd \
               -name '*.yaml' \
               ! -name 'values.yaml' \
               ! -name 'install.yaml' \
               ! -name 'secret.yaml' \
            | xargs kubeconform \
                -strict \
                -ignore-missing-schemas \
                -kubernetes-version 1.31.0 \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                -skip IngressRoute,IngressRouteTCP,Middleware,TraefikService,Certificate,ClusterIssuer,Issuer,SealedSecret,HelmChart,HelmRelease,RecurringJob,Application,ApplicationSet,AppProject \
                -summary

  terraform:
    name: Terraform Validate + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Init (no backend)
        run: terraform -chdir=terraform/proxmox init -backend=false
      - name: Validate
        run: terraform -chdir=terraform/proxmox validate
      - name: Format check
        run: terraform -chdir=terraform/proxmox fmt -check -recursive

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible-lint + required collections
        run: |
          pip install ansible-lint
          ansible-galaxy collection install -r ansible/requirements.yml
      - name: Lint live playbooks (legacy swarm/rke2/portainer excluded)
        run: |
          ansible-lint \
            --exclude ansible/inventories/ \
            --exclude ansible/playbooks/docker/swarm/ \
            --exclude ansible/playbooks/docker/docker_portainer/ \
            --exclude ansible/playbooks/kubernetes/rke2/ \
            --exclude ansible/playbooks/ubuntu/wazuh-single-node.yaml \
            --exclude ansible/playbooks/vaultwarden/backup-validation.yml \
            --skip-list fqcn,name[prefix],yaml[truthy],no-changed-when,ignore-errors,risky-shell-pipe,command-instead-of-shell,command-instead-of-module,var-naming,risky-file-permissions,jinja[spacing],no-handler,yaml[commas],name[casing],name[template],name[play],yaml[line-length] \
            ansible/playbooks/

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.0
          curl -sSLo gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar xf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Scan full history
        run: gitleaks detect --source . --log-level warn
