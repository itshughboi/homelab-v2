name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint \
            --config-data '{extends: default, rules: {line-length: {max: 200}, truthy: {allowed-values: ["true", "false"]}}}' \
            apps/kubernetes/ \
            ansible/playbooks/ \
            bootstrap/

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Lint Ansible playbooks
        run: |
          ansible-lint ansible/playbooks/
        env:
          ANSIBLE_ROLES_PATH: ansible/roles

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform init (no backend)
        working-directory: terraform/proxmox
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform/proxmox
        run: terraform validate

      - name: Terraform format check
        working-directory: terraform/proxmox
        run: terraform fmt -check -recursive

  kubernetes-validate:
    name: Kubernetes Manifest Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Dry-run apply apps manifests
        run: |
          find apps/kubernetes/k3s/apps \
               apps/kubernetes/k3s/infra \
               apps/kubernetes/k3s/networking \
               apps/kubernetes/k3s/monitoring \
               -name '*.yaml' \
               ! -name 'values.yaml' \
               ! -name 'install.yaml' \
               ! -name 'secret.yaml' \
           | xargs -I{} kubectl apply --dry-run=client -f {} || true

      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz kubeconform
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Schema validate manifests
        run: |
          find apps/kubernetes/k3s/apps \
               apps/kubernetes/k3s/infra \
               apps/kubernetes/k3s/networking \
               apps/kubernetes/k3s/monitoring \
               -name '*.yaml' \
               ! -name 'values.yaml' \
               ! -name 'install.yaml' \
               ! -name 'secret.yaml' \
           | kubeconform \
               -ignore-missing-schemas \
               -schema-location default \
               -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
               -output pretty \
               -

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSLo gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.21.0_linux_x64.tar.gz
          tar xf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan for secrets
        run: gitleaks detect --source . --log-level warn

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sSLo trivy.tar.gz \
            https://github.com/aquasecurity/trivy/releases/latest/download/trivy_$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | grep tag_name | cut -d'"' -f4 | tr -d v)_Linux-64bit.tar.gz
          tar xf trivy.tar.gz trivy
          chmod +x trivy
          sudo mv trivy /usr/local/bin/

      - name: Scan k8s manifests for misconfigurations
        run: |
          trivy config \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format table \
            apps/kubernetes/

      - name: Scan Dockerfiles for vulnerabilities
        run: |
          find . -name 'Dockerfile' -o -name 'Dockerfile.*' | while read df; do
            echo "Scanning $df"
            trivy config --exit-code 0 --severity HIGH,CRITICAL "$df"
          done

  docs-build:
    name: Docs Build (Hugo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Hugo (extended)
        run: |
          HUGO_VERSION=0.161.1
          curl -sSLo hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: Regenerate content/ from docs/ and build
        run: |
          cd docs/hugo
          ./sync.sh
          hugo build --logLevel warn

      - name: Fail on unresolved internal .md links
        run: |
          cd docs/hugo
          bad=$(grep -rohE 'href="[^"]*\.md[^"]*"' public/ --include='*.html' \
                | grep -vE 'https?://|bootstrap/|packer/|terraform/|ansible/|apps/' | sort -u || true)
          if [ -n "$bad" ]; then
            echo "Unresolved internal .md links (broken source links):"; echo "$bad"; exit 1
          fi
          echo "All internal doc links resolve."
