name: Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint Kubernetes manifests
        run: |
          yamllint -d '{
            extends: relaxed,
            rules: {
              line-length: {max: 200},
              truthy: {allowed-values: ["true", "false", "yes", "no"]},
              comments: disable,
              document-start: disable
            }
          }' apps/kubernetes/

      - name: Lint Ansible playbooks
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' ansible/

  kubeconform:
    name: Kubernetes Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          chmod +x /usr/local/bin/kubeconform

      - name: Validate k8s manifests
        run: |
          # Skip CRD types that kubeconform doesn't have schemas for
          find apps/kubernetes/k3s/apps -name '*.yaml' | \
            grep -v 'secret.yaml' | \
            xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version 1.31.0 \
              -skip IngressRoute,IngressRouteTCP,Middleware,TraefikService,Certificate,ClusterIssuer,Issuer,SealedSecret,HelmChart,HelmRelease,Application,ApplicationSet,RecurringJob \
              -summary

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        run: |
          curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Add Helm repos
        run: |
          helm repo add traefik https://traefik.github.io/charts
          helm repo add jetstack https://charts.jetstack.io
          helm repo add longhorn https://charts.longhorn.io
          helm repo add metallb https://metallb.github.io/metallb
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add emberstack https://emberstack.github.io/helm-charts
          helm repo add crowdsec https://crowdsecurity.github.io/helm-charts
          helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
          helm repo update

      - name: Lint Traefik values
        run: |
          helm lint apps/kubernetes/k3s/networking/traefik/helm/traefik/ \
            --values apps/kubernetes/k3s/networking/traefik/helm/traefik/values.yaml || true

      - name: Lint kube-prometheus-stack values
        run: |
          helm lint prometheus-community/kube-prometheus-stack \
            --values apps/kubernetes/k3s/monitoring/kube-prometheus-stack/values.yaml || true

  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform fmt check
        run: terraform -chdir=terraform/proxmox fmt -check -recursive

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform init (no backend)
        run: terraform -chdir=terraform/proxmox init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform/proxmox validate

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Lint playbooks
        # Exclude rules that are noisy for a homelab (fqcn, name formatting)
        run: |
          ansible-lint \
            --exclude ansible/inventories/ \
            --skip-list fqcn,name[prefix],yaml[truthy],no-changed-when \
            ansible/playbooks/ || true

  sops-coverage:
    name: SOPS Secret Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .env.sops coverage against .env.example
        # For every service with a .env.example, verify:
        #   1. A .env.sops file exists (secrets have been migrated)
        #   2. All variable names in .env.example are present in .env.sops
        #
        # Note: we only check KEY names here, not values — decryption requires
        # the age private key which CI does not have (by design).
        # SOPS dotenv format stores keys in plaintext, values encrypted, so
        # key presence is verifiable without secrets.
        run: |
          EXIT=0

          while IFS= read -r example_file; do
            service_dir=$(dirname "$example_file")
            service=$(echo "$service_dir" | sed 's|apps/docker/||')
            sops_file="$service_dir/.env.sops"

            # Check .env.sops exists
            if [[ ! -f "$sops_file" ]]; then
              echo "MISSING .env.sops: $service"
              echo "  Run: ./scripts/sops-migrate.sh $service"
              EXIT=1
              continue
            fi

            # Check all keys from .env.example are present in .env.sops
            EXAMPLE_KEYS=$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$example_file" \
              | cut -d= -f1 | sort)
            SOPS_KEYS=$(grep -oE '^[A-Za-z_][A-Za-z0-9_]*' "$sops_file" \
              | sort || true)

            MISSING=$(comm -23 \
              <(echo "$EXAMPLE_KEYS") \
              <(echo "$SOPS_KEYS") || true)

            if [[ -n "$MISSING" ]]; then
              echo "KEY MISMATCH: $service/.env.sops is missing keys:"
              echo "$MISSING" | sed 's/^/  - /'
              EXIT=1
            else
              echo "OK: $service"
            fi
          done < <(find apps/docker -name ".env.example" | sort)

          exit $EXIT
