---
services:
  n8n:
    container_name: n8n
    image: n8nio/n8n:2.22.0
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
      - apparmor:unconfined
    logging:
      driver: loki
      options:
        loki-url: "https://loki.hughboi.cc/loki/api/v1/push"
        loki-retries: 2
        loki-max-backoff: 800ms
        loki-timeout: 1s
        keep-file: "true"
        mode: "non-blocking"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - /home/hughboi/data/n8n/data:/home/node/.n8n
      - /home/hughboi/data/n8n/files:/files
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.entrypoints=http"
      - "traefik.http.routers.n8n.rule=Host(`n8n.hughboi.cc`)"
      - "traefik.http.middlewares.n8n-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.n8n.middlewares=n8n-https-redirect"
      - "traefik.http.routers.n8n-secure.entrypoints=https"
      - "traefik.http.routers.n8n-secure.rule=Host(`n8n.hughboi.cc`)"
      - "traefik.http.routers.n8n-secure.tls=true"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.docker.network=proxy"
    deploy:
      resources:
        limits:
          memory: 1g
          pids: 300
        reservations:
          memory: 256m
    networks:
      - proxy
      - n8n

  postgres:
    container_name: n8n-db
    image: postgres:15
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    env_file:
      - .env
    volumes:
      - /home/hughboi/data/n8n/db:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m
          pids: 300
        reservations:
          memory: 128m
    networks:
      - n8n


networks:
  n8n:
  proxy:
    external: true
