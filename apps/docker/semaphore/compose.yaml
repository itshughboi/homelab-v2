---
services:
  mysql:
    container_name: semaphore-mysql
    image: docker.io/library/mysql:8.4
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 300
    logging:
      driver: loki
      options:
        loki-url: "https://loki.hughboi.cc/loki/api/v1/push"
        loki-retries: 2
        loki-max-backoff: 800ms
        loki-timeout: 1s
        keep-file: "true"
        mode: "non-blocking"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - semaphore-mysql:/var/lib/mysql
    networks:
      - semaphore

  semaphore:
    container_name: semaphore
    image: docker.io/semaphoreui/semaphore:v2.18.4
    restart: unless-stopped
    # COMPOSE_UID/COMPOSE_GID, not UID/GID: UID is a bash readonly built-in and always
    # equals the real host user's ID — sops-run.sh can't export a differing value for it
    # (see apps/docker/semaphore/README.md). This image needs UID 1001 specifically,
    # which is never your real host UID, so it needs its own variable name.
    user: "${COMPOSE_UID}:${COMPOSE_GID}"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: loki
      options:
        loki-url: "https://loki.hughboi.cc/loki/api/v1/push"
        loki-retries: 2
        loki-max-backoff: 800ms
        loki-timeout: 1s
        keep-file: "true"
        mode: "non-blocking"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SEMAPHORE_DB_USER=${MYSQL_USER}
      - SEMAPHORE_DB_PASS=${MYSQL_PASSWORD}
      - SEMAPHORE_DB_HOST=mysql
      - SEMAPHORE_DB_PORT=3306
      - SEMAPHORE_DB_DIALECT=mysql
      - SEMAPHORE_DB=${MYSQL_DATABASE}
      - SEMAPHORE_PLAYBOOK_PATH=/tmp/semaphore/
      - SEMAPHORE_ADMIN_PASSWORD=${SEMAPHORE_ADMIN_PASSWORD}
      - SEMAPHORE_ADMIN_NAME=${SEMAPHORE_ADMIN_NAME}
      - SEMAPHORE_ADMIN_EMAIL=${SEMAPHORE_ADMIN_EMAIL}
      - SEMAPHORE_ADMIN=${SEMAPHORE_ADMIN_NAME}
      - SEMAPHORE_ACCESS_KEY_ENCRYPTION=${SEMAPHORE_ACCESS_KEY_ENCRYPTION}
      - ANSIBLE_HOST_KEY_CHECKING=false
    volumes:
      - /home/hughboi/data/semaphore/inventory/:/inventory:ro
      - /home/hughboi/data/semaphore/authorized-keys/:/authorized-keys:ro
      - /home/hughboi/data/semaphore/config/:/etc/semaphore:rw
      # For playbooks/scripts/docker/sops-deploy: sops/age must be *statically linked*
      # binaries — Semaphore's image is Alpine/musl, and Athena's apt-installed `age`
      # is dynamically linked against glibc and won't run here (confirmed: exec fails
      # silently with no useful error). Use the static release binaries from
      # github.com/FiloSottile/age/releases and github.com/getsops/sops/releases,
      # not whatever `apt`/`age-setup.sh`'s dependency check happens to find first.
      - /usr/local/bin/sops:/usr/local/bin/sops:ro
      - /usr/local/bin/age:/usr/local/bin/age:ro
      - /usr/local/bin/age-keygen:/usr/local/bin/age-keygen:ro
      # Age private key — moved out of ~/.config (chmod 750 on $HOME blocks traversal
      # for any UID that isn't hughboi or in the hughboi group) to /etc/sops/age, which
      # is world-traversable (755). Key itself is hughboi:root 640 — this container
      # runs as 1001:0 (COMPOSE_GID=0, see below), so group 0 is what actually needs
      # read access, not a semaphore-specific group.
      - /etc/sops/age/keys.txt:/home/semaphore/.config/sops/age/keys.txt:ro
    ports:
      - "3001:3000"   # HTTP — Traefik on dock-prod routes here by static IP (see traefik/data/config.yml). 3001 to avoid clashing with Gitea's 3000 on the same host.
    networks:
      - semaphore


volumes:
  semaphore-mysql:
    driver: local

networks:
  # NOT internal — see apps/docker/gitea/compose.yaml for why: internal: true
  # blocks ports: publishing, not just internet egress.
  semaphore:
