---
services:
  gitea:
    container_name: gitea
    image: gitea/gitea:1.26
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: loki
      options:
        loki-url: "https://loki.hughboi.cc/loki/api/v1/push"
        loki-retries: 2
        loki-max-backoff: 800ms
        loki-timeout: 1s
        keep-file: "true"
        mode: "non-blocking"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=${POSTGRES_DB}
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
    volumes:
      - /home/hughboi/data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "222:22"   # Git SSH — required for git push over SSH
      - "3000:3000"   # HTTP — Traefik on dock-prod routes here by static IP (see traefik/data/config.yml)
    networks:
      - gitea

  postgres:
    container_name: gitea-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 300
    logging:
      driver: loki
      options:
        loki-url: "https://loki.hughboi.cc/loki/api/v1/push"
        loki-retries: 2
        loki-max-backoff: 800ms
        loki-timeout: 1s
        keep-file: "true"
        mode: "non-blocking"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - gitea

  runner:
    container_name: gitea-runner
    image: docker.io/gitea/act_runner:0.4.0
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: loki
      options:
        loki-url: "https://loki.hughboi.cc/loki/api/v1/push"
        loki-retries: 2
        loki-max-backoff: 800ms
        loki-timeout: 1s
        keep-file: "true"
        mode: "non-blocking"
    depends_on:
      gitea:
        condition: service_started
    environment:
      - CONFIG_FILE=/config.yml
      - GITEA_INSTANCE_URL=https://gitea.hughboi.cc
      - GITEA_RUNNER_REGISTRATION_TOKEN=${REGISTRATION_TOKEN}
      - GITEA_RUNNER_NAME=Hermes
    volumes:
      - ./config.yml:/config.yml
      - /home/hughboi/data/gitea/runner:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gitea


volumes:
  db:

networks:
  # NOT internal — `internal: true` blocks more than internet egress, it also
  # suppresses the NAT/port-forwarding rules that make `ports:` publishing work
  # on any service attached to it (learned the hard way: gitea's 3000/22 ports
  # never bound to the host with internal: true set here). The `ports:` list
  # under the gitea service is what actually limits its host-facing surface —
  # postgres has no ports: entry, so it's unreachable from outside regardless.
  gitea:
