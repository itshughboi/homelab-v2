---
services:
  adguardhome:
    container_name: adguard
    image: adguard/adguardhome:v0.107.71
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: loki
      options:
        loki-url: "https://loki.hughboi.cc/loki/api/v1/push"
        loki-retries: 2
        loki-max-backoff: 800ms
        loki-timeout: 1s
        keep-file: "true"
        mode: "non-blocking"
    environment:
      - TZ=America/Denver
      - ADGUARD_DNS_=192.168.100.10#5335   # IP of unbound on the unbound network
    volumes:
      - /home/hughboi/adguard/adguard-data/work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # - "853:853/tcp"    # DNS over TLS
      # - "784:784/udp"    # Unbound remote control
      # - "3000:3000/tcp"  # Setup UI — only needed for first spin-up
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adguard.entrypoints=http"
      - "traefik.http.routers.adguard.rule=Host(`adguard.hughboi.cc`)"
      - "traefik.http.middlewares.adguard-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.adguard.middlewares=adguard-https-redirect"
      - "traefik.http.routers.adguard-secure.entrypoints=https"
      - "traefik.http.routers.adguard-secure.rule=Host(`adguard.hughboi.cc`)"
      - "traefik.http.routers.adguard-secure.tls=true"
      - "traefik.http.routers.adguard-secure.service=adguard"
      - "traefik.http.services.adguard.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
    networks:
      unbound:
        ipv4_address: 192.168.100.9
      proxy:

  unbound:
    container_name: unbound
    image: mvance/unbound:1.22.0
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "-p", "53", "cloudflare.com"]
      interval: 600s
      timeout: 10s
      retries: 3
    volumes:
      - /home/hughboi/adguard/unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
      - /home/hughboi/adguard/unbound/forward-records.conf:/opt/unbound/etc/unbound/forward-records.conf:ro
      - /home/hughboi/adguard/unbound/root.hints:/opt/unbound/etc/unbound/root.hints:ro
      - /home/hughboi/adguard/unbound:/opt/unbound/etc/unbound/var
    ports:
      - "5335:53/tcp"
      - "5335:53/udp"
    networks:
      unbound:
        ipv4_address: 192.168.100.10


volumes:
  adguard_conf:
    external: true

networks:
  unbound:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/27
  proxy:
    external: true
