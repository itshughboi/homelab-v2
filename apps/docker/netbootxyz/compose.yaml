---
services:
  netbootxyz:
    container_name: netbootxyz
    image: lscr.io/linuxserver/netbootxyz:0.7.6
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: loki
      options:
        loki-url: "https://loki.hughboi.cc/loki/api/v1/push"
        loki-retries: 2
        loki-max-backoff: 800ms
        loki-timeout: 1s
        keep-file: "true"
        mode: "non-blocking"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
      - PORT_RANGE=30000:30010
      - SUBFOLDER=/
    volumes:
      - config:/config
      - assets:/assets
    ports:
      - "69:69/udp"   # TFTP — must be open to LAN for PXE boot
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netboot.entrypoints=http"
      - "traefik.http.routers.netboot.rule=Host(`netboot.hughboi.cc`)"
      - "traefik.http.middlewares.netboot-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.netboot.middlewares=netboot-https-redirect"
      - "traefik.http.routers.netboot-secure.entrypoints=https"
      - "traefik.http.routers.netboot-secure.rule=Host(`netboot.hughboi.cc`)"
      - "traefik.http.routers.netboot-secure.tls=true"
      - "traefik.http.services.netboot.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
    networks:
      - proxy


volumes:
  config:
  assets:

networks:
  proxy:
    external: true
