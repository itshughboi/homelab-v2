apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ezbookkeeping
  namespace: ezbookkeeping
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`bookkeeping.hughboi.vip`)
      kind: Rule
      services:
        - name: ezbookkeeping
          port: 8080
  tls:
    secretName: hughboi-tls
