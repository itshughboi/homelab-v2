apiVersion: v1
kind: PersistentVolume
metadata:
  name: file-browser-truenas
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
    - noatime
  nfs:
    server: 10.10.40.5         # TrueNAS storage-VLAN NIC (VLAN 40)
    path: /mnt/truenas/data       # NFS export path — adjust to your share
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: file-browser-truenas
  namespace: file-browser
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: file-browser-truenas
  resources:
    requests:
      storage: 1Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: file-browser-db
  namespace: file-browser
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
