---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-controller
  namespace: unifi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unifi-controller
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: unifi-controller
    spec:
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mongo 27017; do sleep 2; done"]
      containers:
        - name: controller
          image: jacobalberty/unifi:latest
          env:
            - name: DB_URI
              value: "mongodb://mongo/unifi"
            - name: STATDB_URI
              value: "mongodb://mongo/unifi_stat"
            - name: DB_NAME
              value: "unifi"
          # net.ipv4.ip_unprivileged_port_start=0 allows the unifi user to bind to low ports.
          # Requires kubelet flag: --allowed-unsafe-sysctls=net.ipv4.ip_unprivileged_port_start
          # Add to k3s server config: kubelet-arg: ["allowed-unsafe-sysctls=net.ipv4.ip_unprivileged_port_start"]
          securityContext:
            runAsUser: 999  # unifi user in jacobalberty image
          ports:
            - containerPort: 8443   # GUI / API
            - containerPort: 8080   # device inform
            - containerPort: 3478
              protocol: UDP         # STUN
            - containerPort: 10001
              protocol: UDP         # AP discovery
            - containerPort: 6789   # speed test
            - containerPort: 8880   # HTTP portal
            - containerPort: 8843   # HTTPS portal
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /unifi
            - name: backup
              mountPath: /unifi/data/backup
            - name: run
              mountPath: /var/run/unifi
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: unifi-data
        - name: backup
          persistentVolumeClaim:
            claimName: unifi-backup
        - name: run
          emptyDir: {}  # runtime socket files — ephemeral is fine
---
# Internal service — used by unifi-poller and the IngressRoute for the UI
apiVersion: v1
kind: Service
metadata:
  name: unifi-controller
  namespace: unifi
spec:
  selector:
    app: unifi-controller
  ports:
    - name: gui
      port: 8443
      targetPort: 8443
    - name: inform
      port: 8080
      targetPort: 8080
---
# LoadBalancer — all ports that APs, switches, and clients connect to directly.
# Note the IP MetalLB assigns here — your devices must be informed of this address.
# If migrating from Docker, update the inform URL on all adopted devices.
apiVersion: v1
kind: Service
metadata:
  name: unifi-controller-lb
  namespace: unifi
spec:
  type: LoadBalancer
  selector:
    app: unifi-controller
  ports:
    - name: stun
      port: 3478
      targetPort: 3478
      protocol: UDP
    - name: ap-discovery
      port: 10001
      targetPort: 10001
      protocol: UDP
    - name: inform
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: speed-test
      port: 6789
      targetPort: 6789
      protocol: TCP
    - name: http-portal
      port: 8880
      targetPort: 8880
      protocol: TCP
    - name: https-portal
      port: 8843
      targetPort: 8843
      protocol: TCP
