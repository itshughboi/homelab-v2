apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config
  namespace: renovate
data:
  # endpoint = Athena Gitea by direct IP — the same canonical source ArgoCD pulls from
  # (NOT an in-cluster Gitea; that plan was sunset). Requires the k3s→10.10.10.8:3000
  # firewall allow, same as ArgoCD.
  config.json: |
    {
      "$schema": "https://docs.renovatebot.com/renovate-schema.json",
      "platform": "gitea",
      "endpoint": "http://10.10.10.8:3000",
      "repositories": ["hughboi/homelab"],
      "automerge": false,
      "dependencyDashboard": true,
      "labels": ["renovate"],
      "prConcurrentLimit": 5,
      "prHourlyLimit": 2,
      "timezone": "America/Denver",
      "schedule": ["after 10pm on sunday"],
      "packageRules": [
        {
          "matchUpdateTypes": ["patch"],
          "automerge": true,
          "automergeType": "pr",
          "platformAutomerge": true
        },
        {
          "matchPackageNames": ["tensorchord/pgvecto-rs"],
          "enabled": false,
          "description": "Immich requires a specific pgvecto-rs version — do not auto-update"
        },
        {
          "matchPackageNames": ["ghcr.io/goauthentik/server"],
          "schedule": ["at any time"],
          "automerge": false,
          "description": "Authentik updates are deliberate — review changelogs before upgrading"
        }
      ]
    }
