apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.11
          ports:
            - containerPort: 8096
              name: http
          env:
            - name: TZ
              value: America/Denver
          volumeMounts:
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /cache
            - name: films
              mountPath: /Films
              readOnly: true
            - name: tvshows
              mountPath: /TVShows
              readOnly: true
            - name: music
              mountPath: /Music
              readOnly: true
            - name: concerts
              mountPath: /Concerts
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi
          # Uncomment if GPU transcoding is desired:
          # securityContext:
          #   privileged: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: cache
          persistentVolumeClaim:
            claimName: jellyfin-cache
        - name: films
          persistentVolumeClaim:
            claimName: jellyfin-films
        - name: tvshows
          persistentVolumeClaim:
            claimName: jellyfin-tvshows
        - name: music
          persistentVolumeClaim:
            claimName: jellyfin-music
        - name: concerts
          persistentVolumeClaim:
            claimName: jellyfin-concerts
