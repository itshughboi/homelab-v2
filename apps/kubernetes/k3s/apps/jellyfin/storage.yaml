apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
# NFS PV for each media library — TrueNAS storage VLAN (10.10.40.5), read-only
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-films
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 10.10.40.5
    path: /mnt/truenas/jellyfin/Films
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-films
  namespace: jellyfin
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: jellyfin-films
  resources:
    requests:
      storage: 10Ti
---
