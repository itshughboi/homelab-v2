apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant-postgres
  namespace: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant-postgres
  template:
    metadata:
      labels:
        app: home-assistant-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: home-assistant-env
          env:
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF-8"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "homeassistant", "-d", "homeassistant"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: home-assistant-db
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-postgres
  namespace: home-assistant
spec:
  selector:
    app: home-assistant-postgres
  ports:
    - port: 5432
      targetPort: 5432
