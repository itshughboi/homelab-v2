# Create imperatively — never commit with real values:
#
#   kubectl create secret generic pve-exporter-env \
#     --namespace prometheus-pve-exporter \
#     --from-literal=PVE_USER=prometheus@pve \
#     --from-literal=PVE_PASSWORD=<token-secret> \
#     --from-literal=PVE_TOKEN_NAME=prometheus \
#     --from-literal=PVE_VERIFY_SSL=false
#
# In Proxmox, create a dedicated API token (not a full user password):
#   1. Datacenter → Permissions → API Tokens → Add
#      User: prometheus@pve, Token ID: prometheus, uncheck "Privilege Separation"
#   2. Datacenter → Permissions → Add → API Token Permission
#      Path: /, Token: prometheus@pve!prometheus, Role: PVEAuditor (read-only)
#
# Using an API token (PVE_TOKEN_NAME + PVE_PASSWORD as the token secret) is
# preferred over a user password — tokens can be revoked without changing the user.
apiVersion: v1
kind: Secret
metadata:
  name: pve-exporter-env
  namespace: prometheus-pve-exporter
type: Opaque
# data: populated imperatively via kubectl create secret
