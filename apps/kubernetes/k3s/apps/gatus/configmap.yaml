apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: gatus
data:
  config.yaml: |
    storage:
      type: postgres
      path: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@gatus-postgres:5432/${POSTGRES_DB}?sslmode=disable"

    alerting:
      ntfy:
        url: "${NTFY_URL}"
        topic: alerts
        priority: 3

    endpoints:
      # ─── k8s services ─────────────────────────────────────────────
      - name: Vaultwarden
        url: https://vaultwarden.hughboi.vip
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: Grafana
        url: https://grafana.hughboi.vip
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: SearXNG
        url: https://search.hughboi.vip
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: ntfy
        url: https://ntfy.hughboi.vip
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      - name: Mealie
        url: https://mealie.hughboi.vip
        interval: 1m
        conditions:
          - "[STATUS] == 200"

      # ─── infrastructure ────────────────────────────────────────────
      - name: AdGuard
        url: http://10.10.30.65:3000
        interval: 1m
        conditions:
          - "[STATUS] == 200"
