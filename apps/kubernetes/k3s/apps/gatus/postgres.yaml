apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus-postgres
  namespace: gatus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gatus-postgres
  template:
    metadata:
      labels:
        app: gatus-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: gatus-env
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "gatus", "-d", "gatus"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gatus-data
---
apiVersion: v1
kind: Service
metadata:
  name: gatus-postgres
  namespace: gatus
spec:
  selector:
    app: gatus-postgres
  ports:
    - port: 5432
      targetPort: 5432
