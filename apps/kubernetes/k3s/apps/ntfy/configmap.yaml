apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
data:
  server.yml: |
    base-url: https://ntfy.hughboi.vip
    cache-file: /var/cache/ntfy/cache.db
    cache-duration: 12h
    auth-file: /var/cache/ntfy/user.db
    auth-default-access: deny-all
    behind-proxy: true
    log-level: info
