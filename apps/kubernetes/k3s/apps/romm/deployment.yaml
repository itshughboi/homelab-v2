apiVersion: apps/v1
kind: Deployment
metadata:
  name: romm
  namespace: romm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: romm
  template:
    metadata:
      labels:
        app: romm
    spec:
      initContainers:
        - name: wait-for-mariadb
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z romm-mariadb 3306; do sleep 2; done"]
      containers:
        - name: romm
          image: rommapp/romm:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              value: romm-mariadb
            - name: DB_NAME
              value: romm
            - name: DB_USER
              value: romm-user
            - name: HASHEOUS_API_ENABLED
              value: "true"
          envFrom:
            - secretRef:
                name: romm-env
          volumeMounts:
            - name: resources
              mountPath: /romm/resources
            - name: redis
              mountPath: /redis-data
            - name: library
              mountPath: /romm/library
            - name: assets
              mountPath: /romm/assets
          readinessProbe:
            httpGet:
              path: /api/heartbeat
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/heartbeat
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: resources
          persistentVolumeClaim:
            claimName: romm-resources
        - name: redis
          persistentVolumeClaim:
            claimName: romm-redis
        - name: library
          persistentVolumeClaim:
            claimName: romm-library
        - name: assets
          persistentVolumeClaim:
            claimName: romm-assets
