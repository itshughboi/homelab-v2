---
# NFS consume path — TrueNAS drop folder for documents to auto-import
apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-consume
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: TRUENAS_IP           # e.g. 10.10.10.50
    path: /mnt/tank/paperless    # NFS export path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume
  namespace: paperless-ngx
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: paperless-consume
  resources:
    requests:
      storage: 100Gi
