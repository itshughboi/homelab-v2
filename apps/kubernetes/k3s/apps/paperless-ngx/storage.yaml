# NFS consume path — TrueNAS: paperless-ngx's own index/metadata store (search index,
# thumbnails cache paths, etc.) — the document library itself, not just the drop folder.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-data
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 10.10.40.5           # TrueNAS storage-VLAN NIC (VLAN 40)
    path: /mnt/truenas/paperless-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-data
  namespace: paperless-ngx
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: paperless-data
  resources:
    requests:
      storage: 10Gi
---
