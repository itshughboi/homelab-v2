---
# NFS consume path — TrueNAS drop folder for documents to auto-import
apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-consume
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 10.10.40.5           # TrueNAS storage-VLAN NIC (VLAN 40)
    path: /mnt/truenas/paperless    # NFS export path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume
  namespace: paperless-ngx
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: paperless-consume
  resources:
    requests:
      storage: 100Gi
