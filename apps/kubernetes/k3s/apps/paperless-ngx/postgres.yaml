apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-postgres
  namespace: paperless-ngx
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperless-postgres
  template:
    metadata:
      labels:
        app: paperless-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          envFrom:
            - secretRef:
                name: paperless-env
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "paperless", "-d", "paperless"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-postgres
  namespace: paperless-ngx
spec:
  selector:
    app: paperless-postgres
  ports:
    - port: 5432
      targetPort: 5432
