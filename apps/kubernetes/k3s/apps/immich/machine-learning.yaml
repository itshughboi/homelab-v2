apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      containers:
        - name: machine-learning
          # Use openvino variant for Intel GPU acceleration
          # Use plain image tag for CPU-only: ghcr.io/immich-app/immich-machine-learning:release
          image: ghcr.io/immich-app/immich-machine-learning:release-openvino
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: immich-env
          readinessProbe:
            httpGet:
              path: /ping
              port: 3003
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /ping
              port: 3003
            initialDelaySeconds: 40
            periodSeconds: 30
          volumeMounts:
            - name: cache
              mountPath: /cache
          # OpenVINO GPU acceleration — requires Intel GPU on the node
          # Uncomment to enable:
          # securityContext:
          #   capabilities:
          #     add: [SYS_ADMIN]
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: immich-ml-cache
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  selector:
    app: immich-machine-learning
  ports:
    - port: 3003
      targetPort: 3003
