apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: fasten-health
  namespace: fasten-health
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`fastenhealth.hughboi.vip`)
      kind: Rule
      services:
        - name: fasten-health
          port: 8080
  tls:
    secretName: hughboi-tls
