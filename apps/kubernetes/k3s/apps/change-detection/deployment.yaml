apiVersion: apps/v1
kind: Deployment
metadata:
  name: change-detection
  namespace: change-detection
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: change-detection
  template:
    metadata:
      labels:
        app: change-detection
    spec:
      containers:
        - name: changedetection
          image: ghcr.io/dgtlmoon/changedetection.io:0.55.7
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: PLAYWRIGHT_DRIVER_URL
              value: ws://localhost:3000
            - name: BASE_URL
              value: https://change.hughboi.vip
          volumeMounts:
            - name: data
              mountPath: /datastore
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false

        - name: playwright-chrome
          # final tag of the deprecated dockerhub line — project moved to ghcr.io/browserless/chromium (v2, different API)
          image: browserless/chrome:1.61.1-chrome-stable
          env:
            - name: SCREEN_WIDTH
              value: "1920"
            - name: SCREEN_HEIGHT
              value: "1024"
            - name: SCREEN_DEPTH
              value: "16"
            - name: ENABLE_DEBUGGER
              value: "false"
            - name: PREBOOT_CHROME
              value: "true"
            - name: CONNECTION_TIMEOUT
              value: "300000"
            - name: MAX_CONCURRENT_SESSIONS
              value: "10"
            - name: CHROME_REFRESH_TIME
              value: "600000"
            - name: DEFAULT_BLOCK_ADS
              value: "true"
            - name: DEFAULT_STEALTH
              value: "true"
            - name: DEFAULT_IGNORE_HTTPS_ERRORS
              value: "true"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: change-detection-data
