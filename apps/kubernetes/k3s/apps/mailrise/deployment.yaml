apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailrise
  namespace: mailrise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailrise
  template:
    metadata:
      labels:
        app: mailrise
    spec:
      containers:
        - name: mailrise
          image: yoryan/mailrise:latest
          ports:
            - containerPort: 8025
              name: smtp
          volumeMounts:
            - name: config
              mountPath: /etc/mailrise.conf
              subPath: mailrise.conf
          readinessProbe:
            tcpSocket:
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8025
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: mailrise-config
