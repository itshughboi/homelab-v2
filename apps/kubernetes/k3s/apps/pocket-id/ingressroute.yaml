apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pocket-id.hughboi.vip`)
      kind: Rule
      services:
        - name: pocket-id
          port: 1411
  tls:
    secretName: hughboi-tls
