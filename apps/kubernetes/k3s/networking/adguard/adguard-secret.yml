# Create imperatively — do NOT apply this file
#
# AdGuard Home manages user authentication within its own config file (AdGuardHome.yaml).
# Users are configured through the web UI on first boot and persisted to the PVC.
# There is no need for a separate users secret — AdGuard stores bcrypt-hashed passwords
# in its own config directory (/opt/adguardhome/conf/AdGuardHome.yaml on the PVC).
#
# To add/change users: log into https://adguard.hughboi.vip and use Settings → Users.
#
# If you want a pre-configured admin user via secret (advanced), you would need a custom
# entrypoint script that merges the secret into AdGuardHome.yaml before starting the process.
# This is not currently implemented — use the web UI instead.
