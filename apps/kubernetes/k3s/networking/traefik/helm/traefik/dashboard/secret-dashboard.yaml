# The Traefik dashboard uses HTTP Basic Auth via a middleware. Generate htpasswd:
#
#   htpasswd -nb admin <strong-password> | base64
#   # then:
#   kubectl create secret generic traefik-dashboard-auth -n traefik \
#     --from-literal=users="<htpasswd-output>"
#
# Or use Authentik forward auth instead of basic auth for dashboard SSO.
