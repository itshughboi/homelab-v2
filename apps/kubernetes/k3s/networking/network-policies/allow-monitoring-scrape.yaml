# Allows Prometheus (in the monitoring namespace) to scrape metrics from all pods.
# Apply to every namespace that has prometheus.io/scrape: "true" annotations.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  # namespace: set at apply time
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
        - port: 9100
        - port: 9300
        - port: 8080
        # Add other metrics ports as needed per app
