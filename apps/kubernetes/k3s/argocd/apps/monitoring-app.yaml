apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: http://gitea.gitea.svc.cluster.local:3000/hughboi/homelab.git
    targetRevision: main
    path: apps/kubernetes/k3s/monitoring
    directory:
      recurse: false
      exclude: "README.md"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
