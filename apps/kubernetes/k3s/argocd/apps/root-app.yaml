apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    # Athena-hosted Gitea — see apps-appset.yaml note (needs k3s→10.10.10.8:3000 firewall allow)
    repoURL: http://10.10.10.8:3000/hughboi/homelab.git
    targetRevision: main
    path: apps/kubernetes/k3s/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
