apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/hughboi/homelab.git
        revision: main
        directories:
          - path: apps/kubernetes/k3s/apps/*
  template:
    metadata:
      name: "{{.path.basename}}"
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/hughboi/homelab.git
        targetRevision: main
        path: "{{.path.fullPath}}"
        directory:
          recurse: false
          exclude: "README.md"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: ""
          kind: Secret
          jsonPointers:
            - /data
