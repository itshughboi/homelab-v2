# Requires hughboi-tls secret to be reflected into the monitoring namespace.
# See: traefik/helm/traefik/cert-manager/certificates/production/hughboi-production.yaml
# Reflector mirrors it automatically once the secretTemplate annotations are applied.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    # "kube-prometheus-stack" matches the Helm release name
    - match: Host(`grafana.hughboi.cc`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls:
    secretName: hughboi-tls
