# Exposes k3s Prometheus internally so dock-prod Grafana can use it as a data source.
# NOT exposed on the external ingress class — only reachable from inside the homelab network.
#
# After applying, add this data source in dock-prod Grafana (grafana.hughboi.cc):
#   URL: https://prometheus.hughboi.vip
#   Access: Server (proxy)
#   Name: k3s-prometheus
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prometheus.hughboi.vip`)
      kind: Rule
      services:
        # "kube-prometheus-stack" matches the Helm release name
        - name: kube-prometheus-stack-prometheus
          port: 9090
  tls:
    secretName: hughboi-tls
