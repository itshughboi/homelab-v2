# Exposes k3s Prometheus at prometheus.hughboi.cc for dock-prod Grafana to use as a data source.
#
# SECURITY: Protected by IP allowlist middleware (internal-only).
# Only RFC-1918 and Tailscale CGNAT ranges can reach this endpoint.
# Public internet receives a 403 before Prometheus sees the request.
#
# The Middleware and IngressRoute must be in the same namespace.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: internal-only
  namespace: monitoring
spec:
  ipAllowList:
    sourceRange:
      - "10.0.0.0/8"          # all internal VLANs (Proxmox, k3s, management)
      - "172.16.0.0/12"       # Docker bridge networks
      - "192.168.0.0/16"      # home LAN
      - "100.64.0.0/10"       # Tailscale CGNAT range
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prometheus.hughboi.cc`)
      kind: Rule
      middlewares:
        - name: internal-only         # blocks public internet before reaching Prometheus
          namespace: monitoring
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
  tls:
    secretName: hughboi-tls
