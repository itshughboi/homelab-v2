# helm repo add grafana https://grafana.github.io/helm-charts
# helm upgrade --install loki grafana/loki \
#   -n monitoring --create-namespace \
#   -f values.yaml

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  limits_config:
    ingestion_rate_mb: 20
    ingestion_rate_strategy: global
    max_entries_limit_per_query: 5000
    max_query_length: 7d

  ruler:
    alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi

# Disable distributed components — not needed for single binary
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: true  # provides a single /loki/api/v1/push endpoint for Alloy and Grafana

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
