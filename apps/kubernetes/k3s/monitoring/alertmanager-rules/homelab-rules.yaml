apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: monitoring
  labels:
    # kube-prometheus-stack picks up rules with this label
    release: kube-prometheus-stack
spec:
  groups:
    - name: nodes
      rules:
        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} is down"
            description: "Node exporter on {{ $labels.instance }} has been unreachable for 2 minutes."

        - alert: NodeHighCPU
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.instance }}"
            description: "CPU usage on {{ $labels.instance }} has been above 90% for 10 minutes (current: {{ $value | printf \"%.1f\" }}%)."

        - alert: NodeDiskUsageHigh
          expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Disk usage high on {{ $labels.instance }}"
            description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}% full."

        - alert: NodeDiskUsageCritical
          expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes) * 100 > 95
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Disk almost full on {{ $labels.instance }}"
            description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}% full — critical."

        - alert: NodeMemoryPressure
          expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Memory pressure on {{ $labels.instance }}"
            description: "Memory usage on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}%."

    - name: pods
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value | printf \"%.0f\" }} times in the last 15 minutes."

        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="true"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for more than 10 minutes."

        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas != kube_deployment_status_available_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
            description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has {{ $value }} unavailable replicas."

    - name: certificates
      rules:
        - alert: CertificateExpiringSoon
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expiring soon"
            description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in less than 14 days."

        - alert: CertificateExpiryCritical
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 3 * 24 * 3600
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expiring in 3 days"
            description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in less than 3 days — renewal may have failed."

        - alert: CertificateNotReady
          expr: certmanager_certificate_ready_status{condition="True"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} is not ready"
            description: "cert-manager certificate {{ $labels.namespace }}/{{ $labels.name }} has been in a non-ready state for 10 minutes."

    - name: longhorn
      rules:
        - alert: LonghornVolumeActualSpaceUsedWarning
          expr: (longhorn_volume_actual_size_bytes / longhorn_volume_capacity_bytes) * 100 > 90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is almost full"
            description: "Longhorn volume {{ $labels.volume }} is {{ $value | printf \"%.1f\" }}% full."

        - alert: LonghornVolumeDegraded
          expr: longhorn_volume_robustness == 2
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is degraded"
            description: "Longhorn volume {{ $labels.volume }} is in a degraded state — one or more replicas may be unavailable."

        - alert: LonghornVolumeFaulted
          expr: longhorn_volume_robustness == 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is faulted"
            description: "Longhorn volume {{ $labels.volume }} is faulted — data may be at risk."

        - alert: LonghornNodeStorageFull
          expr: (1 - longhorn_node_storage_reservable_bytes / longhorn_node_storage_capacity_bytes) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn node {{ $labels.node }} storage is {{ $value | printf \"%.1f\" }}% used"
            description: "Longhorn storage node {{ $labels.node }} is running low on available space."

    - name: k3s
      rules:
        - alert: KubernetesPVCPending
          expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} stuck pending"
            description: "PersistentVolumeClaim {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has been in Pending state for 10 minutes — check Longhorn or StorageClass."

        - alert: KubernetesJobFailed
          expr: kube_job_status_failed > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed"
            description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} has failed."
