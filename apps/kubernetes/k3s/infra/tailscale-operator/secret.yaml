# Tailscale Operator OAuth credentials
#
# Created imperatively — never stored in this file.
#
# Prerequisites:
#   - Create an OAuth client in Tailscale Admin → Settings → OAuth clients
#   - Grant scopes: devices:write, auth_keys
#   - Add ACL tag: tag:k8s-operator (in Tailscale Admin → Access Controls)
#
# Create the Secret before running helm install:
#
#   kubectl create namespace tailscale
#   kubectl create secret generic operator-oauth \
#     --namespace tailscale \
#     --from-literal=client_id=<oauth-client-id> \
#     --from-literal=client_secret=<oauth-client-secret>
#
# Retrieve client_id and client_secret from Vaultwarden:
#   Entry: "homelab / tailscale / k8s-operator-oauth"
